<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Erreur de Connexion - Expert IA</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
            background: #111;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { color: #ef4444; margin-bottom: 1rem; }
        p { line-height: 1.6; color: #888; }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Serveur Hors-Ligne</h1>
        <p>Le logiciel Expert IA ne parvient pas à se connecter au serveur central.</p>
        <p><strong>Solution :</strong> Assurez-vous que le site web est lancé (commande <code>npm run dev</code>) avant d'ouvrir ce logiciel.</p>
        <button class="btn" onclick="window.location.reload()">Réessayer la Connexion</button>
    </div>
    <script>
        // Tentative automatique de reconnexion toutes les 10 secondes
        setInterval(() => {
            window.location.reload();
        }, 10000);
    </script>
</body>
</html>
